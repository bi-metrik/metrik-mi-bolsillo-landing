<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#F5F4F2"/>
  <!-- Green accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="#10B981"/>
  <!-- Mb mark -->
  <text x="80" y="160" font-family="'Montserrat',sans-serif" font-weight="700" font-size="64" fill="#1A1A1A">M</text>
  <text x="140" y="165" font-family="'Montserrat',sans-serif" font-weight="700" font-size="38" fill="#1A1A1A">b</text>
  <rect x="80" y="175" width="100" height="4" rx="2" fill="#10B981"/>
  <!-- Title -->
  <text x="80" y="300" font-family="'Montserrat',sans-serif" font-weight="900" font-size="64" fill="#1A1A1A">Controla tu plata</text>
  <text x="80" y="375" font-family="'Montserrat',sans-serif" font-weight="900" font-size="64" fill="#1A1A1A">desde <tspan fill="#10B981">WhatsApp</tspan></text>
  <!-- Subtitle -->
  <text x="80" y="440" font-family="'Montserrat',sans-serif" font-weight="400" font-size="28" fill="#6B7280">Manda un mensaje. La IA categoriza en 3 segundos.</text>
  <text x="80" y="475" font-family="'Montserrat',sans-serif" font-weight="400" font-size="28" fill="#6B7280">Sin app. Sin cuenta nueva. Sin Excel.</text>
  <!-- MéTRIK brand -->
  <text x="80" y="565" font-family="'Montserrat',sans-serif" font-weight="700" font-size="22" fill="#9CA3AF">Un producto</text>
  <text x="245" y="565" font-family="'Montserrat',sans-serif" font-weight="700" font-size="22" fill="#1A1A1A">MéTRIK</text>
  <rect x="245" y="572" width="95" height="2" rx="1" fill="#10B981"/>
  <!-- URL -->
  <text x="80" y="600" font-family="'Montserrat',sans-serif" font-weight="500" font-size="18" fill="#10B981">metrikbolsillo.co</text>
</svg>
